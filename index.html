<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>Ledger — daily food log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#121212;
    --surface:#1A1A1A;
    --surface-2:#1F1F1F;
    --ink:#FFFFFF;
    --ink-soft:rgba(255,255,255,0.64);
    --ink-faint:rgba(255,255,255,0.38);
    --primary:#BB86FC;
    --primary-variant:#3700B3;
    --on-primary:#000000;
    --secondary:#03DAC6;
    --on-secondary:#000000;
    --error:#CF6679;
    --on-error:#000000;
    --line:rgba(255,255,255,0.12);
    --line-strong:rgba(255,255,255,0.26);
    --radius:14px;
    --shadow:0 1px 2px rgba(0,0,0,0.4), 0 12px 28px rgba(0,0,0,0.5);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    font-family:'Inter',sans-serif;
    color:var(--ink);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:0;
    -webkit-tap-highlight-color:transparent;
  }
  #app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    background:var(--bg);
    position:relative;
    padding-bottom:40px;
  }
  @media (min-width:520px){
    body{padding:32px 16px;}
    #app{min-height:calc(100vh - 64px); border-radius:20px; overflow:hidden; box-shadow:var(--shadow);}
  }

  header{padding:22px 20px 8px;}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin:0 0 2px;
  }
  h1.brand{
    font-family:'Inter',sans-serif;
    font-weight:800;
    font-size:25px;
    margin:0 0 16px;
    letter-spacing:-0.02em;
  }
  .date-nav{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .date-nav button.icon-btn{
    width:34px;height:34px; border-radius:50%; border:1px solid var(--line);
    background:var(--surface); display:flex;align-items:center;justify-content:center;
    cursor:pointer; color:var(--ink); flex:none;
  }
  .date-nav button.icon-btn:active{transform:scale(0.94);}
  .date-label{
    font-family:'IBM Plex Mono',monospace; font-size:14px; font-weight:500;
    text-align:center; flex:1; cursor:pointer; padding:6px 8px; border-radius:8px; position:relative;
  }
  .date-label:active{background:rgba(255,255,255,0.06);}
  input#date-picker{position:absolute; opacity:0; pointer-events:none; width:1px;height:1px; left:50%; bottom:-6px; color-scheme:dark;}

  .label-card{
    margin:18px 20px 0; background:var(--surface); border:1.5px solid var(--line-strong);
    border-radius:10px; padding:14px 16px 16px;
  }
  .label-title{font-family:'Inter',sans-serif; font-weight:700; font-size:18px; margin:0 0 6px; letter-spacing:-0.01em;}
  .rule-thick{height:3px; background:var(--ink); margin:0 0 8px; border-radius:2px;}
  .rule-thin{height:1px; background:var(--line); margin:8px 0;}
  .cal-row{display:flex; align-items:baseline; justify-content:space-between;}
  .cal-row .cal-label{font-size:15px; font-weight:600;}
  .cal-row .cal-value{font-family:'IBM Plex Mono',monospace; font-size:32px; font-weight:600; letter-spacing:-0.01em;}
  .progress-track{height:6px; border-radius:3px; background:var(--line); margin:10px 0 2px; overflow:hidden;}
  .progress-fill{height:100%; background:var(--primary); border-radius:3px; transition:width 0.3s ease;}
  .progress-fill.over{background:var(--error);}
  .goal-row{display:flex; justify-content:space-between; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .goal-row span.editable{text-decoration:underline dotted; text-decoration-color:var(--primary); cursor:pointer; color:var(--ink);}
  .macro-row{display:flex; justify-content:space-between; align-items:center; padding:6px 0 6px 14px; font-size:13px;}
  .macro-row .m-label{color:var(--ink-soft);}
  .macro-row .m-value{font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:13px;}

  .actions{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:18px 20px 0;}
  .action-btn{
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
    padding:16px 10px; border-radius:var(--radius); border:none; cursor:pointer;
    font-family:'Inter',sans-serif; font-weight:600; font-size:13.5px;
  }
  .action-btn:active{transform:scale(0.97);}
  .action-btn.primary{background:var(--primary); color:var(--on-primary);}
  .action-btn.secondary{background:var(--surface); color:var(--ink); border:1px solid var(--line);}
  .action-btn svg{width:22px;height:22px;}

  .search-row{margin:10px 20px 0; position:relative;}
  .search-row input{
    width:100%; padding:11px 14px 11px 38px; border-radius:10px; border:1px solid var(--line);
    background:var(--surface); font-family:'Inter',sans-serif; font-size:14px; color:var(--ink);
  }
  .search-row input::placeholder{color:var(--ink-faint);}
  .search-row input:focus{outline:2px solid var(--primary); outline-offset:1px;}
  .search-row svg{position:absolute; left:12px; top:50%; transform:translateY(-50%); width:16px;height:16px; color:var(--ink-soft); pointer-events:none;}
  .search-results{margin-top:8px; display:flex; flex-direction:column; gap:6px;}
  .search-result{
    background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:10px 12px;
    cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:8px;
  }
  .search-result:active{background:var(--surface-2);}
  .search-result .sr-name{font-size:13.5px; font-weight:600;}
  .search-result .sr-brand{font-size:11.5px; color:var(--ink-soft);}
  .search-result .sr-cal{font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:600; white-space:nowrap;}

  .section-title{font-family:'Inter',sans-serif; font-weight:700; font-size:16px; margin:24px 20px 10px; letter-spacing:-0.01em;}

  .macro-card{
    margin:18px 20px 0; background:var(--surface); border:1px solid var(--line);
    border-radius:14px; padding:14px 16px 16px;
  }
  .macro-card-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
  .seg-toggle{display:flex; background:var(--bg); border-radius:20px; padding:3px; gap:2px;}
  .seg-btn{
    border:none; background:none; cursor:pointer; padding:6px 12px; border-radius:16px;
    font-family:'Inter',sans-serif; font-size:12px; font-weight:600; color:var(--ink-soft);
  }
  .seg-btn.active{background:var(--primary); color:var(--on-primary);}
  .macro-chart-row{display:flex; align-items:center; gap:20px;}
  .macro-chart-wrap{position:relative; width:132px; height:132px; flex:none;}
  .macro-chart-center{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    display:flex; flex-direction:column; align-items:center; pointer-events:none;
  }
  .mc-cal{font-family:'IBM Plex Mono',monospace; font-size:18px; font-weight:600; line-height:1;}
  .mc-cal-label{font-size:10px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.06em; margin-top:2px; text-align:center;}
  .content-grid{display:block;}
  .col-calories .label-card{margin:18px 20px 0;}
  .col-log .actions{margin:18px 20px 0;}
  @media (min-width:760px){
    body{padding:32px 16px;}
    #app{max-width:900px;}
    .content-grid{
      display:grid; grid-template-columns:300px 1fr; gap:0; align-items:start;
    }
    .col-calories{position:sticky; top:24px;}
    .col-calories .label-card{margin:18px 0 0 20px;}
    .col-log .actions{margin:18px 20px 0 20px;}
  }

  .week-bars{margin-top:16px; padding-top:14px; border-top:1px solid var(--line);}
  .week-bars-label{font-size:12px; font-weight:600; color:var(--ink-soft); margin:0 0 10px;}
  .macro-legend{flex:1; display:flex; flex-direction:column; gap:12px;}
  .legend-item{display:flex; flex-direction:column; gap:5px; cursor:pointer;}
  .legend-row{display:flex; align-items:center; gap:8px; font-size:12.5px;}
  .legend-dot{width:9px; height:9px; border-radius:50%; flex:none;}
  .legend-label{color:var(--ink-soft); flex:1; text-decoration:underline dotted; text-decoration-color:var(--line-strong); text-underline-offset:2px;}
  .legend-val{font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:12px;}
  .legend-goal{font-family:'IBM Plex Mono',monospace; font-weight:400; font-size:11px; color:var(--ink-faint);}
  .legend-bar-track{height:4px; border-radius:2px; background:var(--line); margin-left:17px; overflow:hidden;}
  .legend-bar-fill{height:100%; border-radius:2px; transition:width 0.3s ease;}
  .log-list{display:flex; flex-direction:column; gap:8px; padding:0 20px;}
  .food-card{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:12px 14px;}
  .food-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .food-name{font-size:14.5px; font-weight:600; line-height:1.3;}
  .food-brand{font-size:12px; color:var(--ink-soft); margin-top:1px;}
  .food-cal{font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:15px; white-space:nowrap;}
  .food-bottom{display:flex; justify-content:space-between; align-items:center; margin-top:10px;}
  .macro-mini{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); display:flex; gap:8px;}
  .qty-controls{display:flex; align-items:center; gap:8px;}
  .qty-controls button{
    width:24px;height:24px; border-radius:50%; border:1px solid var(--line); background:var(--bg);
    cursor:pointer; display:flex;align-items:center;justify-content:center; font-size:14px; color:var(--ink); line-height:1;
  }
  .qty-controls .qty-val{font-family:'IBM Plex Mono',monospace; font-size:12px; min-width:34px; text-align:center;}
  .delete-btn{
    background:none; border:none; cursor:pointer; color:var(--error);
    display:flex;align-items:center;justify-content:center; width:26px;height:26px; border-radius:50%;
  }
  .delete-btn:active{background:rgba(207,102,121,0.15);}
  .empty-state{
    margin:0 20px; padding:32px 20px; text-align:center; color:var(--ink-soft); font-size:13.5px;
    border:1px dashed var(--line); border-radius:var(--radius);
  }

  .modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,0.6); display:none; align-items:flex-end; justify-content:center; z-index:100;}
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--surface-2); width:100%; max-width:480px; border-radius:20px 20px 0 0;
    padding:18px 20px 28px; max-height:88vh; overflow-y:auto; animation:slideUp 0.22s ease;
    border-top:1px solid var(--line-strong);
  }
  @keyframes slideUp{from{transform:translateY(24px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .modal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .modal-head h2{font-family:'Inter',sans-serif; font-weight:700; font-size:18px; margin:0; letter-spacing:-0.01em;}
  .modal-close{background:none; border:none; cursor:pointer; width:30px;height:30px; display:flex;align-items:center;justify-content:center; color:var(--ink-soft);}
  .field-label{font-size:12px; font-weight:600; color:var(--ink-soft); margin:12px 0 5px; display:block;}
  .field-label:first-of-type{margin-top:0;}
  .modal input[type=text],.modal input[type=number]{
    width:100%; padding:10px 12px; border-radius:9px; border:1px solid var(--line);
    background:var(--surface); font-family:'Inter',sans-serif; font-size:14px; color:var(--ink);
  }
  .modal input::placeholder{color:var(--ink-faint);}
  .modal input:focus{outline:2px solid var(--primary); outline-offset:1px;}
  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .field-row3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;}
  .modal-submit{
    width:100%; margin-top:18px; padding:13px; border-radius:10px; border:none;
    background:var(--primary); color:var(--on-primary); font-weight:700; font-size:14.5px; cursor:pointer;
  }
  .modal-submit:active{transform:scale(0.98);}

  #scan-video-wrap{position:relative; width:100%; aspect-ratio:4/3; background:#000; border-radius:12px; overflow:hidden; margin-bottom:10px;}
  #scan-video{width:100%;height:100%;object-fit:cover;}
  .scan-frame{
    position:absolute; top:50%;left:50%; transform:translate(-50%,-50%);
    width:78%; height:34%; border:2px solid var(--primary); border-radius:10px;
  }
  .scan-status{text-align:center; font-size:12.5px; color:var(--ink-soft); margin:2px 0 14px;}
  .divider-or{display:flex;align-items:center;gap:10px; color:var(--ink-soft); font-size:11.5px; text-transform:uppercase; letter-spacing:0.08em; margin:14px 0 12px;}
  .divider-or::before,.divider-or::after{content:"";flex:1;height:1px;background:var(--line);}

  .confirm-card{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:14px;}
  .confirm-name{font-family:'Inter',sans-serif; font-weight:700; font-size:15px; letter-spacing:-0.01em;}
  .confirm-brand{font-size:12.5px; color:var(--ink-soft); margin-top:1px;}
  .confirm-macros{display:flex; gap:14px; margin-top:10px; font-family:'IBM Plex Mono',monospace; font-size:12px;}
  .confirm-qty{display:flex; align-items:center; justify-content:space-between; margin-top:12px; padding-top:12px; border-top:1px solid var(--line);}
  .stepper{display:flex; align-items:center; gap:12px;}
  .stepper button{width:30px;height:30px; border-radius:50%; border:1px solid var(--line); background:var(--bg); color:var(--ink); font-size:16px; cursor:pointer;}
  .stepper .sval{font-family:'IBM Plex Mono',monospace; font-size:14px; min-width:70px; text-align:center;}

  .toast{
    position:fixed; bottom:24px;left:50%; transform:translateX(-50%) translateY(80px);
    background:var(--surface-2); color:var(--ink); border:1px solid var(--line-strong); padding:11px 18px; border-radius:10px; font-size:13px;
    z-index:200; opacity:0; transition:all 0.25s ease; pointer-events:none; max-width:88%; text-align:center;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .loading-row{display:flex;align-items:center;justify-content:center;gap:8px; padding:20px; color:var(--ink-soft); font-size:13px;}
  .spinner{width:14px;height:14px; border:2px solid var(--line); border-top-color:var(--primary); border-radius:50%; animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="app">

  <header>
    <p class="eyebrow">Personal food ledger</p>
    <h1 class="brand">Ledger</h1>
    <div class="date-nav">
      <button class="icon-btn" id="prev-day" aria-label="Previous day">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="date-label" id="date-label">
        <span id="date-text">Today</span>
        <input type="date" id="date-picker">
      </div>
      <button class="icon-btn" id="next-day" aria-label="Next day">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>
  </header>

  <div class="content-grid">
    <div class="col-calories">
      <div class="label-card">
        <p class="label-title">Daily total</p>
        <div class="rule-thick"></div>
        <div class="cal-row">
          <span class="cal-label">Calories</span>
          <span class="cal-value" id="cal-total">0</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="cal-progress" style="width:0%"></div></div>
        <div class="goal-row">
          <span>Goal: <span class="editable" id="goal-display">1350</span> cal</span>
          <span id="remaining-text">1350 left</span>
        </div>
        <div class="rule-thin"></div>
        <div class="macro-row"><span class="m-label">Protein</span><span class="m-value" id="m-protein">0 g</span></div>
        <div class="macro-row"><span class="m-label">Carbs</span><span class="m-value" id="m-carbs">0 g</span></div>
        <div class="macro-row"><span class="m-label">Fat</span><span class="m-value" id="m-fat">0 g</span></div>
        <div class="rule-thick" style="margin-top:6px;"></div>
      </div>
    </div>

    <div class="col-log">
      <div class="actions">
        <button class="action-btn primary" id="btn-scan">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V5a1 1 0 011-1h2M20 7V5a1 1 0 00-1-1h-2M4 17v2a1 1 0 001 1h2M20 17v2a1 1 0 01-1 1h-2M7 8v8M10 8v8M13 8v8M16 8v8"/></svg>
          Scan barcode
        </button>
        <button class="action-btn secondary" id="btn-manual">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          Add manually
        </button>
      </div>

      <div class="search-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" id="search-input" placeholder="Or search a food by name…">
      </div>
      <div class="search-results" id="search-results"></div>

      <p class="section-title">Today's log</p>
      <div class="log-list" id="log-list"></div>
    </div>
  </div>

  <div class="macro-card">
    <div class="macro-card-head">
      <p class="section-title" style="margin:0;">Macro breakdown</p>
      <div class="seg-toggle">
        <button class="seg-btn active" id="range-day" data-range="day">Today</button>
        <button class="seg-btn" id="range-week" data-range="week">This week</button>
      </div>
    </div>
    <div class="macro-chart-row">
      <div class="macro-chart-wrap">
        <canvas id="macro-chart" width="132" height="132"></canvas>
        <div class="macro-chart-center">
          <span class="mc-cal" id="mc-center-cal">0</span>
          <span class="mc-cal-label" id="mc-center-label">cal</span>
        </div>
      </div>
      <div class="macro-legend" id="macro-legend"></div>
    </div>
    <div class="week-bars" id="week-bars" style="display:none;">
      <p class="week-bars-label">Calories per day</p>
      <canvas id="week-bar-chart" height="130"></canvas>
    </div>
  </div>

</div>

<div class="modal-overlay" id="scan-overlay">
  <div class="modal">
    <div class="modal-head">
      <h2>Scan barcode</h2>
      <button class="modal-close" id="scan-close" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div id="scan-body">
      <div id="scan-video-wrap">
        <video id="scan-video" playsinline muted autoplay></video>
        <div class="scan-frame"></div>
      </div>
      <p class="scan-status" id="scan-status">Point your camera at a barcode.</p>
      <div class="divider-or">or enter it manually</div>
      <label class="field-label">Barcode number</label>
      <input type="text" inputmode="numeric" id="manual-barcode" placeholder="e.g. 3017620422003">
      <button class="modal-submit" id="lookup-barcode-btn">Look up</button>
      <div id="scan-lookup-result"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="manual-overlay">
  <div class="modal">
    <div class="modal-head">
      <h2>Add food manually</h2>
      <button class="modal-close" id="manual-close" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <label class="field-label">Food name</label>
    <input type="text" id="mf-name" placeholder="Grilled chicken breast">
    <label class="field-label">Brand (optional)</label>
    <input type="text" id="mf-brand" placeholder="Homemade">
    <label class="field-label">Serving size</label>
    <div class="field-row">
      <input type="number" id="mf-qty" placeholder="1" value="1" min="0" step="any">
      <input type="text" id="mf-unit" placeholder="serving / g / cup">
    </div>
    <label class="field-label">Calories (per serving above)</label>
    <input type="number" id="mf-cal" placeholder="250" min="0" step="any">
    <label class="field-label">Macros in grams (optional)</label>
    <div class="field-row3">
      <input type="number" id="mf-protein" placeholder="Protein" min="0" step="any">
      <input type="number" id="mf-carbs" placeholder="Carbs" min="0" step="any">
      <input type="number" id="mf-fat" placeholder="Fat" min="0" step="any">
    </div>
    <button class="modal-submit" id="mf-submit">Add to log</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script>
(function(){

  var COLOR_PROTEIN='#03DAC6';
  var COLOR_CARBS='#BB86FC';
  var COLOR_FAT='#CF6679';
  var COLOR_ERROR='#CF6679';
  var COLOR_GRID='rgba(255,255,255,0.12)';
  var COLOR_TICK='rgba(255,255,255,0.55)';

  var today = new Date();

  function dateKey(d){
    var y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
    return y+'-'+m+'-'+day;
  }
  function isToday(d){ return dateKey(d)===dateKey(new Date()); }
  function fmtHeader(d){ return d.toLocaleDateString(undefined,{weekday:'short', month:'short', day:'numeric'}); }
  function round(n){ return Math.round((n||0)*10)/10; }
  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

  function showToast(msg){
    var t=document.getElementById('toast');
    t.textContent=msg;
    t.classList.add('show');
    clearTimeout(showToast._h);
    showToast._h=setTimeout(function(){ t.classList.remove('show'); }, 2400);
  }

  async function storageGet(key){
    try{ var raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : null; }
    catch(e){ return null; }
  }
  async function storageSet(key, value){
    try{ localStorage.setItem(key, JSON.stringify(value)); }
    catch(e){ showToast('Could not save — try again'); }
  }

  function effectiveMacroGoals(){
    return {
      protein: macroGoals.protein!=null ? macroGoals.protein : Math.round(goal*0.30/4),
      carbs: macroGoals.carbs!=null ? macroGoals.carbs : Math.round(goal*0.40/4),
      fat: macroGoals.fat!=null ? macroGoals.fat : Math.round(goal*0.30/9)
    };
  }

  async function loadSettings(){
    var s = await storageGet('settings');
    if(s && s.calorieGoal) goal = s.calorieGoal;
    if(s && s.macroGoals) macroGoals = s.macroGoals;
  }
  async function saveSettings(){ await storageSet('settings', {calorieGoal: goal, macroGoals: macroGoals}); }
  async function loadEntries(d){ var arr = await storageGet('entries:'+dateKey(d)); entries = arr || []; }
  async function saveEntries(d){ await storageSet('entries:'+dateKey(d), entries); }

  function computeTotals(){
    var t={cal:0,protein:0,carbs:0,fat:0};
    entries.forEach(function(e){
      var mult=e.multiplier||1;
      t.cal += (e.calories||0)*mult;
      t.protein += (e.protein||0)*mult;
      t.carbs += (e.carbs||0)*mult;
      t.fat += (e.fat||0)*mult;
    });
    return t;
  }

  /* ---------------- search (Open Food Facts) ---------------- */
  var searchTimer=null;
  var searchAbort=null;
  var searchCache={};
  document.getElementById('search-input').addEventListener('input', function(e){
    var q=e.target.value.trim();
    clearTimeout(searchTimer);

    searchTimer=setTimeout(function(){ runSearch(q); }, 350);

  async function fetchJsonWithRetry(url, signal){
    for(var attempt=0; attempt<2; attempt++){
      try{
        var res=await fetch(url, {signal:signal});
        if(res.status===503 && attempt===0){
          await new Promise(function(r){ setTimeout(r, 800); });
          continue;
        }
        if(!res.ok) return null;
        return await res.json();
      }catch(err){
        if(signal && signal.aborted) throw err;
        if(attempt===0){ await new Promise(function(r){ setTimeout(r, 800); }); continue; }
        return null;
      }
    }
    return null;
  }

  async function runSearch(q){
    var resultsEl=document.getElementById('search-results');
    var cacheKey=q.toLowerCase();
    if(searchCache[cacheKey]){
      renderSearchResults(searchCache[cacheKey], resultsEl);
      return;
    }
    resultsEl.innerHTML='<div class="loading-row"><div class="spinner"></div>Searching…</div>';

    if(searchAbort){ searchAbort.abort(); }
    var controller = new AbortController();
    searchAbort = controller;

    var fields='code,product_name,brands,nutriments,serving_size,serving_quantity';
    var nameUrl='https://world.openfoodfacts.org/cgi/search.pl?search_terms='+encodeURIComponent(q)+
      '&search_simple=1&action=process&json=1&page_size=8&lc=en&fields='+fields;
    var brandUrl='https://world.openfoodfacts.org/cgi/search.pl?search_terms=&brands='+encodeURIComponent(q)+
      '&search_simple=1&action=process&json=1&page_size=8&lc=en&fields='+fields;

    var nameData, nameFailed=false;
    try{
      nameData = await fetchJsonWithRetry(nameUrl, controller.signal);
    }catch(err){
      if(controller.signal.aborted) return;
      nameFailed=true;
    }
    if(controller.signal.aborted) return;

    var nameProducts = (nameData && nameData.products) ? nameData.products : [];
    var brandProducts = [];
    var brandFailed = false;

    // Only spend a second request on the brand search if the name search
    // came back empty or failed — halves how many calls we make per search.
    if(nameProducts.length===0){
      var brandData;
      try{
        brandData = await fetchJsonWithRetry(brandUrl, controller.signal);
      }catch(err){
        if(controller.signal.aborted) return;
        brandFailed=true;
      }
      if(controller.signal.aborted) return;
      brandProducts = (brandData && brandData.products) ? brandData.products : [];
    }

    if(nameFailed && brandFailed){
      resultsEl.innerHTML='<div class="empty-state">Open Food Facts isn\'t responding right now (this happens on their end sometimes). Try again in a bit, or add it manually.</div>';
      return;
    }

    var seen={};
    var products=[];
    nameProducts.concat(brandProducts).forEach(function(p){
      if(p.product_name && !seen[p.code]){ seen[p.code]=true; products.push(p); }
    });
    products=products.slice(0,8);
    searchCache[cacheKey]=products;
    renderSearchResults(products, resultsEl);
  }

  function renderSearchResults(products, resultsEl){
    if(products.length===0){
      resultsEl.innerHTML='<div class="empty-state">No matches. Try a different search or add it manually.</div>';
      return;
    }
    resultsEl.innerHTML='';
    products.forEach(function(p){
      var norm=normalizeProduct(p);
      var row=document.createElement('div');
      row.className='search-result';
      row.innerHTML='<div><div class="sr-name"></div><div class="sr-brand"></div></div><div class="sr-cal"></div>';
      row.querySelector('.sr-name').textContent=norm.name;
      row.querySelector('.sr-brand').textContent=norm.brand||'';
      row.querySelector('.sr-cal').textContent=Math.round(norm.calories)+' cal';
      row.onclick=function(){
        document.getElementById('search-input').value='';
        resultsEl.innerHTML='';
        openConfirm(norm, false);
      };
      resultsEl.appendChild(row);
    });
  }

  function normalizeProduct(p){
    var n=p.nutriments||{};
    var servingQty=parseFloat(p.serving_quantity)||100;
    var servingLabel=p.serving_size || (servingQty+' g');
    var cal, protein, carbs, fat;
    if(n['energy-kcal_serving']!==undefined){
      cal=n['energy-kcal_serving']; protein=n['proteins_serving']||0; carbs=n['carbohydrates_serving']||0; fat=n['fat_serving']||0;
    }else{
      var per100=n['energy-kcal_100g']||0;
      var ratio=servingQty/100;
      cal=per100*ratio;
      protein=(n['proteins_100g']||0)*ratio;
      carbs=(n['carbohydrates_100g']||0)*ratio;
      fat=(n['fat_100g']||0)*ratio;
    }
    return{
      name:p.product_name,
      brand:p.brands? p.brands.split(',')[0].trim() : '',
      barcode:p.code||'',
      calories:cal||0, protein:protein||0, carbs:carbs||0, fat:fat||0,
      servingLabel:servingLabel
    };
  }

  function openConfirm(norm, insideScanModal){

      '<div class="confirm-macros"><span></span><span></span><span></span></div>'+
      '<div class="confirm-qty">'+
        '<div class="stepper"><button class="cq-minus">–</button><span class="sval"></span><button class="cq-plus">+</button></div>'+
        '<button class="modal-submit" style="width:auto; margin:0; padding:9px 18px;">Add to log</button>'+
      '</div>';
    card.querySelector('.confirm-name').textContent=norm.name;
    card.querySelector('.confirm-brand').textContent=(norm.brand?norm.brand+' · ':'')+norm.servingLabel;
    var spans=card.querySelectorAll('.confirm-macros span');
    function updateMacroText(){
      spans[0].textContent='P '+round(norm.protein*mult)+'g';
      spans[1].textContent='C '+round(norm.carbs*mult)+'g';
      spans[2].textContent='F '+round(norm.fat*mult)+'g';
      card.querySelector('.sval').textContent=(mult)+'× ('+Math.round(norm.calories*mult)+' cal)';
    }
    updateMacroText();
    card.querySelector('.cq-plus').onclick=function(){ mult=Math.round((mult+0.5)*10)/10; updateMacroText(); };
    card.querySelector('.cq-minus').onclick=function(){ mult=Math.max(0.5,Math.round((mult-0.5)*10)/10); updateMacroText(); };
    card.querySelector('.modal-submit').onclick=async function(){
      await addEntry({
        name:norm.name, brand:norm.brand, calories:norm.calories,
        protein:norm.protein, carbs:norm.carbs, fat:norm.fat,
        servingLabel:norm.servingLabel, multiplier:mult, barcode:norm.barcode
      });
      container.innerHTML='';
      if(insideScanModal) closeScanModal();

    container.innerHTML='';
    container.appendChild(card);

  var scanOverlay=document.getElementById('scan-overlay');
  document.getElementById('btn-scan').onclick=function(){

  function closeScanModal(){ scanOverlay.classList.remove('open'); stopCamera(); }

  async function startCamera(){
    var statusEl=document.getElementById('scan-status');
    var video=document.getElementById('scan-video');
    if(!('BarcodeDetector' in window)){
      statusEl.textContent='Live scanning isn\'t supported in this browser — enter the barcode number below instead.';
      document.getElementById('scan-video-wrap').style.display='none';
      return;
    }
    try{
      videoStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
      video.srcObject = videoStream;
      await video.play();
      statusEl.textContent='Point your camera at a barcode.';
      scanning=true;
      var detector = new window.BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128']});
      scanLoop(video, detector);
    }catch(err){
      statusEl.textContent='Camera unavailable — enter the barcode number below instead.';
      document.getElementById('scan-video-wrap').style.display='none';
    }
  }

  async function scanLoop(video, detector){
    if(!scanning) return;
    try{
      var codes = await detector.detect(video);
      if(codes && codes.length>0){
        var code=codes[0].rawValue;
        scanning=false;
        document.getElementById('scan-status').textContent='Found: '+code;
        stopCamera();
        lookupBarcode(code, true);
        return;
      }
    }catch(e){}
    requestAnimationFrame(function(){ scanLoop(video, detector); });
  }

  function stopCamera(){
    scanning=false;
    if(videoStream){ videoStream.getTracks().forEach(function(t){ t.stop(); }); videoStream=null; }
  }

  document.getElementById('lookup-barcode-btn').onclick=function(){
    var code=document.getElementById('manual-barcode').value.trim();

    lookupBarcode(code, true);

  async function lookupBarcode(code, insideScanModal){
    var container=document.getElementById('scan-lookup-result');
    container.innerHTML='<div class="loading-row"><div class="spinner"></div>Looking up product…</div>';
    try{
      var url='https://world.openfoodfacts.org/api/v2/product/'+encodeURIComponent(code)+
        '.json?lc=en&fields=code,product_name,brands,nutriments,serving_size,serving_quantity';
      var res=await fetch(url);
      var data=await res.json();
      if(data.status!==1 || !data.product || !data.product.product_name){
        container.innerHTML='<div class="empty-state">No product found for that barcode. Try again or add it manually.</div>';
        return;
      }
      var norm=normalizeProduct(data.product);
      openConfirm(norm, insideScanModal);
    }catch(err){
      container.innerHTML='<div class="empty-state">Couldn\'t reach Open Food Facts. Check your connection or add manually.</div>';
    }
  }

  /* ---------------- macro breakdown + goals ---------------- */
  var chartRange='day';
  var macroChart=null;
  var weekBarChart=null;

  document.getElementById('range-day').onclick=function(){ setRange('day'); };
  document.getElementById('range-week').onclick=function(){ setRange('week'); };
  function setRange(r){
    chartRange=r;
    document.getElementById('range-day').classList.toggle('active', r==='day');
    document.getElementById('range-week').classList.toggle('active', r==='week');
    refreshMacroChart();
    refreshWeekBars();

  async function getWeekTotals(){
    var total={cal:0,protein:0,carbs:0,fat:0};
    for(var i=0;i<7;i++){
      var d=new Date(today);
      d.setDate(d.getDate()-i);
      var arr=await storageGet('entries:'+dateKey(d));
      (arr||[]).forEach(function(e){
        var mult=e.multiplier||1;
        total.cal += (e.calories||0)*mult;
        total.protein += (e.protein||0)*mult;
        total.carbs += (e.carbs||0)*mult;
        total.fat += (e.fat||0)*mult;
      });
    }
    return total;
  }

  async function getWeekDailyTotals(){
    var days=[];
    for(var i=6;i>=0;i--){
      var d=new Date(today);
      d.setDate(d.getDate()-i);
      var arr=await storageGet('entries:'+dateKey(d));
      var cal=0;
      (arr||[]).forEach(function(e){ cal += (e.calories||0)*(e.multiplier||1); });
      days.push({ label: d.toLocaleDateString(undefined,{weekday:'short'}), cal: Math.round(cal) });
    }
    return days;
  }

  function editMacroGoal(macro, label){
    var current = effectiveMacroGoals()[macro];
    var v = prompt('Set your daily '+label+' goal (grams)', current);
    if(v===null) return;
    var n = parseInt(v,10);
    if(!isNaN(n) && n>0){
      macroGoals[macro]=n;
      saveSettings();
      refreshMacroChart();
    }
  }

  async function refreshMacroChart(){
    var totals = chartRange==='day' ? computeTotals() : await getWeekTotals();
    var isWeek = chartRange==='week';
    var pCal=(totals.protein||0)*4, cCal=(totals.carbs||0)*4, fCal=(totals.fat||0)*9;
    var sum=pCal+cCal+fCal;
    var goals=effectiveMacroGoals();

    var centerCal=document.getElementById('mc-center-cal');
    centerCal.textContent = Math.round(totals.cal).toLocaleString();
    document.getElementById('mc-center-label').textContent = isWeek ? 'cal / week' : 'cal';

    var actualPerDay = {
      protein: isWeek ? totals.protein/7 : totals.protein,
      carbs: isWeek ? totals.carbs/7 : totals.carbs,
      fat: isWeek ? totals.fat/7 : totals.fat
    };

    var legend=document.getElementById('macro-legend');
    var rows=[
      {key:'protein', label:'Protein', grams:round(totals.protein), goalGrams:goals.protein, actual:actualPerDay.protein, color:COLOR_PROTEIN},
      {key:'carbs', label:'Carbs', grams:round(totals.carbs), goalGrams:goals.carbs, actual:actualPerDay.carbs, color:COLOR_CARBS},
      {key:'fat', label:'Fat', grams:round(totals.fat), goalGrams:goals.fat, actual:actualPerDay.fat, color:COLOR_FAT}
    ];
    legend.innerHTML='';
    rows.forEach(function(r){
      var pctOfGoal = r.goalGrams>0 ? Math.round((r.actual/r.goalGrams)*100) : 0;
      var barPct = Math.min(100, pctOfGoal);
      var barColor = pctOfGoal>100 ? COLOR_ERROR : r.color;
      var item=document.createElement('div');
      item.className='legend-item';
      var displayGrams = isWeek ? round(r.actual) : r.grams;
      item.innerHTML=
        '<div class="legend-row">'+
          '<span class="legend-dot" style="background:'+r.color+'"></span>'+
          '<span class="legend-label">'+r.label+(isWeek?' (avg)':'')+'</span>'+
          '<span class="legend-val">'+displayGrams+'g <span class="legend-goal">/ '+r.goalGrams+'g · '+pctOfGoal+'%</span></span>'+
        '</div>'+
        '<div class="legend-bar-track"><div class="legend-bar-fill" style="width:'+barPct+'%; background:'+barColor+'"></div></div>';
      item.onclick=function(){ editMacroGoal(r.key, r.label); };
      legend.appendChild(item);
    });

    var avgRow=document.createElement('div');
    avgRow.className='legend-item';
    avgRow.style.cursor='default';
    avgRow.style.paddingTop='4px';
    avgRow.style.borderTop='1px solid var(--line)';
    avgRow.innerHTML='<div class="legend-row"><span class="legend-label" style="text-decoration:none;">'+
      (isWeek?'Daily average':'Calorie goal')+'</span><span class="legend-val">'+
      (isWeek ? Math.round(totals.cal/7).toLocaleString()+' cal' : goal.toLocaleString()+' cal')+'</span></div>';
    legend.appendChild(avgRow);

    var ctx=document.getElementById('macro-chart').getContext('2d');
    var chartData = sum>0 ? [pCal,cCal,fCal] : [1,1,1];
    var chartColors = sum>0 ? [COLOR_PROTEIN,COLOR_CARBS,COLOR_FAT] : [COLOR_EMPTY,COLOR_EMPTY,COLOR_EMPTY];
    if(macroChart){
      macroChart.data.datasets[0].data=chartData;
      macroChart.data.datasets[0].backgroundColor=chartColors;
      macroChart.update();
    }else if(window.Chart){
      macroChart=new Chart(ctx,{
        type:'doughnut',
        data:{ labels:['Protein','Carbs','Fat'], datasets:[{ data:chartData, backgroundColor:chartColors, borderWidth:0 }] },
        options:{
          cutout:'72%',
          plugins:{ legend:{display:false}, tooltip:{enabled: sum>0} },
          animation:{ duration:400 }
        }
      });
    }
  }

  async function refreshWeekBars(){
    var wrap=document.getElementById('week-bars');
    if(chartRange!=='week'){ wrap.style.display='none'; return; }
    wrap.style.display='block';
    var days=await getWeekDailyTotals();
    var labels=days.map(function(d){ return d.label; });
    var data=days.map(function(d){ return d.cal; });
    var colors=days.map(function(d){ return d.cal>goal ? COLOR_ERROR : COLOR_PROTEIN; });
    var ctx=document.getElementById('week-bar-chart').getContext('2d');
    if(weekBarChart){
      weekBarChart.data.labels=labels;
      weekBarChart.data.datasets[0].data=data;
      weekBarChart.data.datasets[0].backgroundColor=colors;
      weekBarChart.update();
    }else if(window.Chart){
      weekBarChart=new Chart(ctx,{
        type:'bar',
        data:{ labels:labels, datasets:[{ data:data, backgroundColor:colors, borderRadius:4, maxBarThickness:30 }] },
        options:{
          plugins:{
            legend:{display:false},
            tooltip:{ callbacks:{ label:function(c){ return c.parsed.y.toLocaleString()+' cal'; } } }
          },
          scales:{
            y:{ beginAtZero:true, grid:{color:COLOR_GRID}, ticks:{ font:{family:'IBM Plex Mono', size:10}, color:COLOR_TICK } },
            x:{ grid:{display:false}, ticks:{ font:{family:'IBM Plex Mono', size:10}, color:COLOR_TICK } }
          },
          animation:{ duration:400 }
        }
      });
    }
  }

  async function init(){
    await loadSettings();
    await loadEntries(currentDate);
    renderAll();
  }
  init();

})();
</script>
</body>
</html>
